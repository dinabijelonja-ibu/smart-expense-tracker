services:
  db:
    image: pgvector/pgvector:pg17
    container_name: smart-expense-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_expense_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_expense_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
