databases:
  - name: smart-expense-db
    databaseName: smart_expense_tracker
    user: smart_expense_tracker_user
    plan: free

services:
  - type: web
    name: smart-expense-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_NAME
        value: Smart Expense Tracker API
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: smart-expense-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RAG_TOP_K
        value: "5"
      - key: AUTOMATION_API_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://smart-expense-frontend.onrender.com,https://smart-expense-frontend-a5km.onrender.com

  - type: web
    name: smart-expense-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smart-expense-backend-6d7v.onrender.com/api/v1
